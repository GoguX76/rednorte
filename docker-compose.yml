services:
  db-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_users:/var/lib/postgresql/data

  ms-users:
    image: oven/bun:latest
    container_name: rednorte-ms-users
    working_dir: /app
    volumes:
      - ./ms-users:/app
    ports:
      - "3001:3001"
    command: sh -c "bun install && bun run --watch src/index.ts"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-users:5432/users_db
      - PORT=3001
    depends_on:
      - db-users

  db-waitlist:
    image: postgres:16-alpine
    container_name: postgres-waitlist
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waitlist_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_waitlist:/var/lib/postgresql/data

  ms-waitlist:
    image: oven/bun:latest
    container_name: rednorte-ms-waitlist
    working_dir: /app
    volumes:
      - ./ms-waitlist:/app
    ports:
      - "3000:3000"
    command: sh -c "bun install && bun run --watch src/index.ts"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-waitlist:5432/waitlist_db
      - PORT=3000
    depends_on:
      rabbitmq:
        condition: service_healthy

  notifications-db:
    image: postgres:16-alpine
    container_name: notifications-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notifications_db
    ports:
      - "5434:5432"
    volumes:
      - notifications_data:/var/lib/postgresql/data

  ms-notifications:
    image: oven/bun:latest
    container_name: rednorte-ms-notifications
    working_dir: /app
    volumes:
      - ./ms-notifications:/app
    ports:
      - "3002:3002"
    command: sh -c "bun install && bun run --watch src/index.ts"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@notifications-db:5432/notifications_db
      - PORT=3002
      - RABBITMQ_URL=amqp://root:root123@rabbitmq:5672
    depends_on:
      - notifications-db
      rabbitmq:
        condition: service_healthy

  bff:
    image: oven/bun:latest
    container_name: rednorte-bff
    working_dir: /app
    volumes:
      - ./bff:/app
    command: sh -c "bun install && bun run dev"
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ms-users
      - ms-waitlist

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rednorte-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_users:
  pgdata_waitlist:
  notifications_data:
