services:
  # Base de datos de los usuarios
  db-users:
    image: postgres:16-alpine
    container_name: postgres-users
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_users:/var/lib/postgresql/data

  # Backend de los usuarios
  ms-users:
    image: oven/bun:latest
    container_name: rednorte-ms-users
    working_dir: /app/ms-users
    depends_on:
      - db-users # Docker esperará a que la BD exista antes de levantar el backend
    volumes:
      - ./ms-users:/app/ms-users
    ports:
      - "3000:3000"
    command: sh -c "bun install && bun run --watch src/index.ts"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://root:rootpassword@db-users:5432/users_db

  # Frontend
  frontend:
    image: oven/bun:latest
    container_name: rednorte-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "4321:4321"
    command: sh -c "bun install && bun run dev --host"
    environment:
      - NODE_ENV=development

volumes:
  pgdata_users:
