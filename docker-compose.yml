version: '3.8'

services:
  ms-users:
    image: oven/bun:latest
    container_name: rednorte-ms-users
    working_dir: /app/ms-users
    volumes:
      # Sincroniza tu código local con el contenedor en tiempo real
      - ./ms-users:/app/ms-users
    ports:
      - "3000:3000" # Ajusta el "3000" si tu index.ts usa otro puerto
    command: sh -c "bun install && bun run --watch index.ts"
    environment:
      - NODE_ENV=development

  frontend:
    image: oven/bun:latest
    container_name: rednorte-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "4321:4321" # Puerto por defecto de Astro
    command: sh -c "bun install && bun run dev --host"
    environment:
      - NODE_ENV=development