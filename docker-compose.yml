services:
  db-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d users_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  ms-users:
    build:
      context: ./ms-users
    container_name: rednorte-ms-users
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-users:5432/users_db
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-users:
        condition: service_healthy

  db-waitlist:
    image: postgres:16-alpine
    container_name: postgres-waitlist
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waitlist_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_waitlist:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d waitlist_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  ms-waitlist:
    build:
      context: ./ms-waitlist
    container_name: rednorte-ms-waitlist
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-waitlist:5432/waitlist_db
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://root:root123@rabbitmq:5672
    depends_on:
      db-waitlist:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifications-db:
    image: postgres:16-alpine
    container_name: notifications-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notifications_db
    ports:
      - "5434:5432"
    volumes:
      - notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d notifications_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  ms-notifications:
    build:
      context: ./ms-notifications
    container_name: rednorte-ms-notifications
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@notifications-db:5432/notifications_db
      - PORT=3002
      - RABBITMQ_URL=amqp://root:root123@rabbitmq:5672
    depends_on:
      notifications-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  krakend:
    image: krakend:2.13.7
    container_name: rednorte-krakend
    volumes:
      - ./krakend:/etc/krakend
    ports:
      - "8080:8080"
    depends_on:
      ms-users:
        condition: service_started
      ms-waitlist:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rednorte-rabbitmq
    ports:
      - "5500:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_users:
  pgdata_waitlist:
  notifications_data:
