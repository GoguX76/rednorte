apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-notifications
  namespace: rednorte
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-notifications
  template:
    metadata:
      labels:
        app: ms-notifications
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: rednorte-secrets
                  key: POSTGRES_USER
          command:
            - sh
            - -c
            - until pg_isready -h notifications-postgres -U $POSTGRES_USER -d notifications_db; do echo "waiting for notifications-postgres"; sleep 2; done
        - name: wait-for-rabbitmq
          image: alpine:3.19
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo "waiting for rabbitmq"; sleep 2; done
      containers:
        - name: app
          image: rednorte/ms-notifications:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: postgres://root:root123@notifications-postgres:5432/notifications_db
            - name: PORT
              value: "3002"
            - name: RABBITMQ_URL
              value: amqp://root:root123@rabbitmq:5672
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 5
