apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-notifications
  namespace: rednorte
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: rednorte/ms-notifications:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgres://root:root123@notifications-postgres:5432/notifications_db
          command: ["bun", "run", "src/db/migrate.ts"]
